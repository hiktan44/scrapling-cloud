services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrapling_cloud}
      POSTGRES_USER: ${POSTGRES_USER:-scrapling}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrapling}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrapling} -d ${POSTGRES_DB:-scrapling_cloud}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      APP_NAME: ${APP_NAME:-Scrapling Cloud}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://scrapling:scrapling@postgres:5432/scrapling_cloud}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      PROXY_PROVIDER_URL: ${PROXY_PROVIDER_URL:-}
      PROXY_PROVIDER_TOKEN: ${PROXY_PROVIDER_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "scrapling_cloud.worker"]
    environment:
      APP_NAME: ${APP_NAME:-Scrapling Cloud}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://scrapling:scrapling@postgres:5432/scrapling_cloud}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      PROXY_PROVIDER_URL: ${PROXY_PROVIDER_URL:-}
      PROXY_PROVIDER_TOKEN: ${PROXY_PROVIDER_TOKEN:-}
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"

volumes:
  postgres_data:
  redis_data:
